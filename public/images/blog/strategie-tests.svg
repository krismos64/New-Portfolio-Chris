    <text x="628" y="158" fill="#a1a1aa">Functions</text>
    <rect x="628" y="164" width="124" height="8" rx="4" fill="#27272a"/>
    <rect x="628" y="164" width="118" height="8" rx="4" fill="#22c55e"/>
    <text x="765" y="172" text-anchor="end" fill="#86efac" font-weight="600">95%</text>

    <text x="628" y="192" fill="#a1a1aa">Lines</text>
    <rect x="628" y="198" width="124" height="8" rx="4" fill="#27272a"/>
    <rect x="628" y="198" width="106" height="8" rx="4" fill="#22c55e"/>
    <text x="765" y="206" text-anchor="end" fill="#86efac" font-weight="600">86%</text>
  </g>

  <!-- Playwright E2E -->
  <rect x="30" y="262" width="380" height="130" rx="8" fill="#0d0d0f" stroke="#1a1030"/>
  <rect x="30" y="262" width="380" height="26" rx="8" fill="#1a1030"/>
  <rect x="30" y="280" width="380" height="8" rx="0" fill="#1a1030"/>
  <text x="220" y="280" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">playwright.spec.ts — Auth flow</text>

  <text x="46" y="304" font-family="monospace" font-size="8.5" fill="#60a5fa">test</text>
  <text x="70" y="304" font-family="monospace" font-size="8.5" fill="#a1a1aa">(</text>
  <text x="76" y="304" font-family="monospace" font-size="8.5" fill="#86efac">'manager can create shift'</text>
  <text x="260" y="304" font-family="monospace" font-size="8.5" fill="#a1a1aa">, async ({</text>
  <text x="318" y="304" font-family="monospace" font-size="8.5" fill="#fcd34d">page</text>
  <text x="344" y="304" font-family="monospace" font-size="8.5" fill="#a1a1aa">}) =&gt; {</text>
  <text x="58" y="318" font-family="monospace" font-size="8.5" fill="#60a5fa">await</text>
  <text x="88" y="318" font-family="monospace" font-size="8.5" fill="#fafafa">page.goto(</text>
  <text x="148" y="318" font-family="monospace" font-size="8.5" fill="#86efac">'/dashboard'</text>
  <text x="220" y="318" font-family="monospace" font-size="8.5" fill="#a1a1aa">)</text>
  <text x="58" y="332" font-family="monospace" font-size="8.5" fill="#60a5fa">await</text>
  <text x="88" y="332" font-family="monospace" font-size="8.5" fill="#fafafa">page.click(</text>
  <text x="152" y="332" font-family="monospace" font-size="8.5" fill="#86efac">'[data-testid="add-shift"]'</text>
  <text x="296" y="332" font-family="monospace" font-size="8.5" fill="#a1a1aa">)</text>
  <text x="58" y="346" font-family="monospace" font-size="8.5" fill="#60a5fa">await</text>
  <text x="88" y="346" font-family="monospace" font-size="8.5" fill="#fafafa">expect(page).toHaveURL(</text>
  <text x="246" y="346" font-family="monospace" font-size="8.5" fill="#86efac">'/shifts/new'</text>
  <text x="318" y="346" font-family="monospace" font-size="8.5" fill="#a1a1aa">)</text>
  <text x="46" y="360" font-family="monospace" font-size="8.5" fill="#a1a1aa">})</text>

