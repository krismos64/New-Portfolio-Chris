  </defs>
  <rect width="800" height="420" fill="url(#bg6)" rx="12"/>

  <text x="400" y="28" text-anchor="middle" font-family="monospace" font-size="11" fill="#a1a1aa" letter-spacing="2">STRATÉGIE DE TESTS — Vitest + Playwright</text>

