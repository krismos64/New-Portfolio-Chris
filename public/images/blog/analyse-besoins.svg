  <text x="663" y="252" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24">Dashboard BI</text>

  <rect x="596" y="272" width="133" height="42" rx="6" fill="#1c1c1e" stroke="#3f3f46" stroke-width="1"/>
  <text x="663" y="290" text-anchor="middle" font-family="monospace" font-size="10" fill="#71717a" font-weight="700">Won't Have</text>
  <text x="663" y="304" text-anchor="middle" font-family="monospace" font-size="9" fill="#52525b">Mobile natif</text>

  <!-- Label article -->
  <rect x="60" y="368" width="220" height="28" rx="6" fill="#1e3a5f" opacity="0.5"/>
  <text x="170" y="386" text-anchor="middle" font-family="monospace" font-size="11" fill="#93c5fd">01 — Analyse des besoins</text>
