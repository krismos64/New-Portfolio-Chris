  <text x="150" y="116" font-family="monospace" font-size="11" fill="#a1a1aa">Persona</text>
  <text x="150" y="132" font-family="monospace" font-size="13" fill="#fafafa" font-weight="600">Manager RH</text>
  <rect x="80" y="168" width="160" height="6" rx="3" fill="#27272a"/>
  <rect x="80" y="168" width="110" height="6" rx="3" fill="#3b82f6" opacity="0.7"/>
  <rect x="80" y="182" width="160" height="6" rx="3" fill="#27272a"/>
  <rect x="80" y="182" width="80" height="6" rx="3" fill="#3b82f6" opacity="0.5"/>

