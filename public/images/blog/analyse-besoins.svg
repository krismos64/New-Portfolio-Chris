    <text x="50" y="14" font-family="monospace" font-size="9" fill="#fafafa">En tant qu'employé</text>
    <text x="10" y="28" font-family="monospace" font-size="9" fill="#a1a1aa">je veux voir mes horaires</text>
    <rect x="190" y="12" width="24" height="14" rx="3" fill="#1e3a5f"/>
    <text x="202" y="22" text-anchor="middle" font-family="monospace" font-size="8" fill="#93c5fd">5pt</text>
  </g>
  <g transform="translate(325, 225)">
