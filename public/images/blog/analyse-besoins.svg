  <text x="663" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#60a5fa">Plannings, Auth</text>

  <rect x="596" y="168" width="133" height="42" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
