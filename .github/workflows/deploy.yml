name: Deploy krismos.fr

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Contrôle rédactionnel (aucun tiret cadratin)
        run: |
          if grep -rn "—\|–" src/ README.md; then
            echo "::error::Tirets cadratins ou demi-cadratins détectés : remplacer par virgule ou deux-points."
            exit 1
          fi

      - name: Type checking
        run: npx astro check

      - name: Build
        run: npm run build

      - name: Déployer sur Hostinger (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ vars.FTP_SERVER_DIR || './public_html/' }}
