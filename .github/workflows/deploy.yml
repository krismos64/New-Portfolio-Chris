name: Deploy krismos.fr

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Contrôle rédactionnel (aucun tiret cadratin)
        run: |
          if grep -rn "—\|–" src/ README.md; then
            echo "::error::Tirets cadratins ou demi-cadratins détectés : remplacer par virgule ou deux-points."
            exit 1
          fi

      - name: Type checking
        run: npx astro check

      - name: Build
        run: npm run build

      - name: Déployer sur Hostinger (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287 # v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          # Le compte FTP Hostinger pointe déjà dans public_html (document root)
          server-dir: ./
